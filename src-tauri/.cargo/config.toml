# Use LLD linker on Windows to handle large binary sizes from 67 handler vtables.
# MSVC link.exe can fail with STATUS_DLL_NOT_FOUND when the PE import table or
# section count exceeds loader capacity. rust-lld (LLD) has no such limitations.
# This is the standard fix for large Rust projects on Windows (Bevy, etc.)
[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"

# Workaround for STATUS_ENTRYPOINT_NOT_FOUND when running cargo test on Windows.
# tauri-build embeds the Windows Common Controls 6.0 manifest only for the main
# binary (rustc-link-arg-bins). Test binaries lack this manifest, so the loader
# loads comctl32.dll v5.x which doesn't export GetWindowSubclass.
# See: https://github.com/tauri-apps/tauri/issues/13419
#      https://github.com/tauri-apps/tauri/issues/14580
[env]
__TAURI_WORKSPACE__ = "true"
