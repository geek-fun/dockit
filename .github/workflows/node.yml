name: Node.js CI
run-name: ${{ github.event.head_commit.message }}

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Phase 1: Inspection — runs in parallel ──────────────────────

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci

      - run: npm run lint:check

      - run: npm audit --audit-level=critical

  test-js:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci

      - run: npm run test:ci

      - name: Upload TypeScript coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: typescript
          fail_ci_if_error: false

  test-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf pkg-config libssl-dev

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Run Rust coverage
        working-directory: src-tauri
        run: |
          cargo llvm-cov --lcov --output-path coverage/lcov.info
          sed -i 's|^SF:src/|SF:src-tauri/src/|' coverage/lcov.info
          sed -i 's|^SF:tests/|SF:src-tauri/tests/|' coverage/lcov.info

      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./src-tauri/coverage/lcov.info
          flags: rust
          fail_ci_if_error: false

  # ── Phase 2: Build — runs after all inspections pass ──────────

  build:
    needs: [lint, test-js, test-rust]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        node-version: [24.x]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          echo "deb http://gb.archive.ubuntu.com/ubuntu jammy main" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf pkg-config libssl-dev

      - name: Install Rust stable
        if: runner.os == 'Linux'
        uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          includeRelease: false
