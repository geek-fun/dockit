name: Node.js CI
run-name: ${{ github.event.head_commit.message }}

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Lint & Audit (once on Ubuntu, fast) ─────────────────

  lint-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci

      - name: Lint & audit
        shell: bash
        run: |
          set +e
          npm run lint:check & pid1=$!
          npm audit --audit-level=critical & pid2=$!
          wait $pid1; rc1=$?
          wait $pid2; rc2=$?
          echo "LINT=$rc1" >> $GITHUB_ENV
          echo "AUDIT=$rc2" >> $GITHUB_ENV

      - name: Report failures
        if: env.LINT != '0' || env.AUDIT != '0'
        run: |
          [ "$LINT" = "0" ] || echo "::error::lint failed (exit $LINT)"
          [ "$AUDIT" = "0" ] || echo "::error::audit failed (exit $AUDIT)"
          exit 1

  # ── Build (per OS: install → test → build → tauri) ──────

  build:
    needs: [lint-audit]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        node-version: [24.x]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      # ── Install ─────────────────────────────────────────

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          echo "deb http://gb.archive.ubuntu.com/ubuntu jammy main" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf pkg-config libssl-dev

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Ensure Visual C++ Redistributable is installed (needed by native Rust deps)
          try {
            $installed = Get-WmiObject -Class Win32_Product | Where-Object { $_.Name -like "*Visual C++*" }
            Write-Host "Installed VC++ runtimes: $($installed.Count)"
          } catch {
            Write-Host "Could not check VC++ runtimes, will attempt install"
          }
          # vswhere to locate VC++ tools
          if (Get-Command vswhere -ErrorAction SilentlyContinue) {
            $path = & vswhere -latest -property productPath
            Write-Host "VS installed at: $path"
          }

      - run: npm ci

      # ── Tests (JS + Rust in parallel per OS) ────────────

      - name: Tests (JS)
        shell: bash
        run: |
          set +e
          npm run test:ci; JS_EXIT=$?
          echo "JS_TEST=$JS_EXIT" >> "$GITHUB_ENV"

      - name: Tests (Rust)
        shell: bash
        run: |
          set +e
          export PATH="$HOME/.cargo/bin:$PATH"
          cd src-tauri && cargo test --lib; RUST_TEST=$?
          echo "RUST_TEST=$RUST_TEST" >> "$GITHUB_ENV"

      - name: Debug Rust binary (Windows)
        if: always() && runner.os == 'Windows' && env.RUST_TEST != '0'
        shell: pwsh
        run: |
          # Find the test binary and try to run it directly for a detailed error
          $bin = Get-ChildItem -Recurse -Filter "dockit-*.exe" | Where-Object { $_.FullName -match 'deps' } | Select-Object -First 1
          if (-not $bin) { Write-Host "No test binary found"; exit 1 }
          Write-Host "Test binary: $($bin.FullName)"
          try {
            $proc = Start-Process -FilePath $bin.FullName -ArgumentList "--list" -NoNewWindow -Wait -PassThru
            Write-Host "Exit code: $($proc.ExitCode)"
          } catch {
            Write-Host "Exception: $_"
          }
          # Also check event log for application errors
          try {
            Get-WinEvent -LogName Application -MaxEvents 5 2>$null | Where-Object { $_.LevelDisplayName -eq 'Error' } | Format-List TimeCreated,Message
          } catch { Write-Host "No events found" }

      - name: Report test failures
        if: env.JS_TEST != '0' || env.RUST_TEST != '0'
        shell: bash
        run: |
          [ "$JS_TEST" = "0" ] || echo "::error::JS tests failed (exit $JS_TEST)"
          [ "$RUST_TEST" = "0" ] || echo "::error::Rust tests failed (exit $RUST_TEST)"
          exit 1

      # ── Coverage (Ubuntu only) ──────────────────────────

      - name: Rust coverage
        if: runner.os == 'Linux'
        run: |
          cd src-tauri
          mkdir -p coverage
          cargo llvm-cov --lcov --output-path coverage/lcov.info
          sed -i 's|^SF:src/|SF:src-tauri/src/|' coverage/lcov.info
          sed -i 's|^SF:tests/|SF:src-tauri/tests/|' coverage/lcov.info

      - name: Upload coverage to Codecov
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info,./src-tauri/coverage/lcov.info
          fail_ci_if_error: false

      # ── Build & Package ─────────────────────────────────

      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          includeRelease: false
